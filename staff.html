<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Personnel — Docline</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script src="config.js"></script>
<script src="shell.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
/* ── VARIABLE ALIASES (shell.js v2 compatibility) ── */
:root{
  --text2:var(--text-2); --text3:var(--text-3); --text4:var(--text-4);
  --surface2:var(--surface-hover);
  --brand-light:var(--brand-subtle);
  --brand2:var(--brand-hover);
  --shadow:var(--shadow-sm);
}

/* ── HEADER ────────────────────────────────────────── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-title{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.4px}
.page-sub{font-size:13px;color:var(--text4);margin-top:3px}

/* ── KPI ROW ───────────────────────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:12px;transition:box-shadow .15s,transform .15s}
.kpi-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.kpi-ico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.kpi-val{font-size:22px;font-weight:800;color:var(--text);line-height:1}
.kpi-lbl{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500}

/* ── FILTER BAR ─────────────────────────────────────── */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-chip{padding:7px 14px;border-radius:var(--rfull);font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text3);font-family:inherit;transition:all .14s;white-space:nowrap}
.filter-chip:hover{border-color:var(--brand);color:var(--brand)}
.filter-chip.active{background:var(--brand-light);border-color:var(--brand);color:var(--brand)}
.filter-spacer{flex:1}
.btn-primary{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--rfull);font-size:13px;font-weight:700;cursor:pointer;border:none;background:var(--brand);color:#fff;font-family:inherit;transition:all .15s;box-shadow:0 2px 8px rgba(0,51,153,.2)}
.btn-primary:hover{background:var(--brand2);transform:translateY(-1px)}
.btn-primary svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round}

/* ── STAFF GRID ─────────────────────────────────────── */
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.staff-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:18px;padding:20px;
  display:flex;flex-direction:column;gap:14px;
  transition:box-shadow .18s,border-color .18s,transform .18s;
  position:relative;overflow:hidden;
  animation:cardIn .3s var(--ease) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.staff-card:hover{box-shadow:var(--shadow-md);border-color:var(--brand-border);transform:translateY(-2px)}
.staff-card.inactive{opacity:.55;filter:grayscale(.3)}
.staff-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--brand),#60A5FA);opacity:0;transition:opacity .2s}
.staff-card:hover::before{opacity:1}

.staff-header{display:flex;align-items:center;gap:14px}
.staff-avatar{
  width:50px;height:50px;border-radius:14px;
  background:var(--brand-light);color:var(--brand);
  font-size:18px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;letter-spacing:-.5px;
}
.staff-name{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.2px}
.staff-role-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:var(--rfull);margin-top:4px}
.role-secretaire{background:rgba(124,58,237,.12);color:#7C3AED}
.role-infirmier{background:rgba(5,150,105,.12);color:#059669}
.role-medecin_assistant{background:rgba(0,51,153,.1);color:var(--brand)}
.role-technicien_labo{background:rgba(217,119,6,.12);color:#D97706}
.role-autre{background:var(--surface2);color:var(--text3)}

.staff-contact{display:flex;flex-direction:column;gap:5px;padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.staff-contact-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3)}
.staff-contact-row svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;flex-shrink:0;color:var(--text4)}
.staff-notes{font-size:12px;color:var(--text4);font-style:italic;line-height:1.5}

.staff-footer{display:flex;align-items:center;justify-content:space-between}
.staff-status{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.status-dot{width:8px;height:8px;border-radius:50%}
.status-dot.active{background:var(--success);box-shadow:0 0 0 2px rgba(5,150,105,.2)}
.status-dot.inactive{background:var(--text4)}
.staff-actions{display:flex;gap:4px}
.btn-icon{width:32px;height:32px;border-radius:10px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text4);transition:all .14s}
.btn-icon:hover{background:var(--surface2);color:var(--text)}
.btn-icon.danger:hover{background:rgba(220,38,38,.08);color:#DC2626}
.btn-icon svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}

/* ── EMPTY ──────────────────────────────────────────── */
.empty-state{text-align:center;padding:64px 20px;color:var(--text4)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:700;color:var(--text3);margin-bottom:6px}

/* ── MODAL ─────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;opacity:0;visibility:hidden;transition:all .2s;backdrop-filter:blur(4px)}
.modal-overlay.open{opacity:1;visibility:visible}
.modal{background:var(--surface);border-radius:20px;width:100%;max-width:480px;box-shadow:0 24px 64px rgba(0,0,0,.18);transform:translateY(14px) scale(.98);transition:transform .24s var(--ease);overflow:hidden;max-height:90vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal-head{padding:20px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:15px;transition:all .12s}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-body{padding:20px 24px}
.modal-footer{padding:14px 24px 20px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.form-input,.form-select,.form-textarea{border:1.5px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:13px;color:var(--text);background:var(--surface);font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s;width:100%;-webkit-appearance:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,51,153,.08)}
.form-textarea{resize:vertical;min-height:72px}
.form-select{cursor:pointer}
.btn-ghost{padding:9px 18px;border-radius:var(--rfull);font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:none;color:var(--text3);font-family:inherit;transition:all .15s}
.btn-ghost:hover{background:var(--surface2)}
.btn-save{padding:10px 24px;border-radius:var(--rfull);font-size:13px;font-weight:700;cursor:pointer;border:none;background:var(--brand);color:#fff;font-family:inherit;transition:all .15s}
.btn-save:hover{background:var(--brand2)}
.btn-save:disabled{opacity:.5;cursor:not-allowed}

/* ── TOAST ──────────────────────────────────────────── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#1E3A5F;color:#fff;padding:11px 22px;border-radius:var(--rfull);font-size:13px;font-weight:600;opacity:0;transition:all .26s var(--ease);z-index:9999;white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.2)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.success{background:var(--success)}.toast.error{background:#DC2626}

@media(max-width:900px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){
  .kpi-row{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
  .staff-grid{grid-template-columns:1fr}
  .shell-page{padding-bottom:80px}
}
</style>
</head>
<body>
<div class="app-shell">
  <aside class="shell-sidebar" id="shell-sidebar"></aside>
  <div class="shell-overlay sb-overlay" id="shell-overlay"></div>
  <header class="shell-topbar" id="shell-topbar"></header>
  <main class="shell-main">
    <div class="shell-page">

      <div class="page-header">
        <div>
          <div class="page-title"> Personnel</div>
          <div class="page-sub">Gérez les membres de votre équipe médicale et administrative</div>
        </div>
        <button class="btn-primary" onclick="openModal()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Ajouter un membre
        </button>
      </div>

      <div class="kpi-row">
        <div class="kpi-card">
          <div class="kpi-ico" style="background:#EFF6FF"><svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:none;stroke:#1D4ED8;stroke-width:2;stroke-linecap:round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
          <div><div class="kpi-val" id="stat-total">—</div><div class="kpi-lbl">Total personnel</div></div>
        </div>
        <div class="kpi-card">
          <div class="kpi-ico" style="background:#ECFDF5"><span style="color:#059669">&#10003;</span></div>
          <div><div class="kpi-val" id="stat-active" style="color:#059669">—</div><div class="kpi-lbl">Actifs</div></div>
        </div>
        <div class="kpi-card">
          <div class="kpi-ico" style="background:#EDE9FE"><svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:none;stroke:#7C3AED;stroke-width:2;stroke-linecap:round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg></div>
          <div><div class="kpi-val" id="stat-secretaires" style="color:#7C3AED">—</div><div class="kpi-lbl">Secrétaires</div></div>
        </div>
        <div class="kpi-card">
          <div class="kpi-ico" style="background:#ECFDF5"><svg viewBox="0 0 24 24" style="width:20px;height:20px;fill:none;stroke:#059669;stroke-width:2;stroke-linecap:round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
          <div><div class="kpi-val" id="stat-infirmiers" style="color:#059669">—</div><div class="kpi-lbl">Infirmiers / Assistants</div></div>
        </div>
      </div>

      <div class="filter-bar">
        <button class="filter-chip active" data-role="all" onclick="setFilter('all',this)">Tous</button>
        <button class="filter-chip" data-role="secretaire" onclick="setFilter('secretaire',this)">Secrétaires</button>
        <button class="filter-chip" data-role="infirmier" onclick="setFilter('infirmier',this)">Infirmiers</button>
        <button class="filter-chip" data-role="medecin_assistant" onclick="setFilter('medecin_assistant',this)">Assistants</button>
        <button class="filter-chip" data-role="technicien_labo" onclick="setFilter('technicien_labo',this)">Techniciens labo</button>
        <div class="filter-spacer"></div>
        <button class="filter-chip" id="filter-inactive" onclick="toggleInactive(this)">Afficher inactifs</button>
      </div>

      <div class="staff-grid" id="staff-grid">
        <div class="empty-state">
          <div class="empty-icon"><svg viewBox="0 0 24 24" style="width:32px;height:32px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
          <div class="empty-title">Aucun membre du personnel</div>
          <div>Ajoutez votre équipe pour une meilleure organisation du cabinet.</div>
        </div>
      </div>

    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Ajouter un membre</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Prénom *</label><input class="form-input" id="f-first" placeholder="Amina" maxlength="60"></div>
        <div class="form-group"><label class="form-label">Nom *</label><input class="form-input" id="f-last" placeholder="Benali" maxlength="60"></div>
      </div>
      <div class="form-row full" style="margin-bottom:12px">
        <div class="form-group"><label class="form-label">Rôle *</label>
          <select class="form-select" id="f-role">
            <option value="secretaire">Secrétaire médicale</option>
            <option value="infirmier">Infirmier / Infirmière</option>
            <option value="medecin_assistant">Médecin assistant</option>
            <option value="technicien_labo">Technicien de laboratoire</option>
            <option value="autre">Autre</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Téléphone</label><input class="form-input" id="f-phone" type="tel" placeholder="0555 123 456" inputmode="tel"></div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="f-email" type="email" placeholder="prenom@cabinet.dz"></div>
      </div>
      <div class="form-row full" style="margin-bottom:0">
        <div class="form-group"><label class="form-label">Notes</label>
          <textarea class="form-textarea" id="f-notes" placeholder="Horaires, spécialité, observations…"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn-save" id="btn-save" onclick="saveStaff()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
var _supa = supabase.createClient(SUPA_URL, SUPA_KEY);
var _uid = null, _staff = [], _editId = null, _filterRole = 'all', _showInactive = false;
var ROLE_LABELS = { secretaire:'Secrétaire', infirmier:'Infirmier(e)', medecin_assistant:'Médecin assistant', technicien_labo:'Technicien labo', autre:'Autre' };
var ROLE_ICONS  = { secretaire:'Sec', infirmier:'Inf', medecin_assistant:'Med', technicien_labo:'Lab', autre:'Aut' };
var AVATAR_COLORS = [
  {bg:'#DBEAFE',color:'#1D4ED8'},{bg:'#D1FAE5',color:'#065F46'},
  {bg:'#EDE9FE',color:'#5B21B6'},{bg:'#FEF9C3',color:'#92400E'},
  {bg:'#FCE7F3',color:'#9D174D'},{bg:'#E0F2FE',color:'#0369A1'},
];

(async function init() {
  var s = await _supa.auth.getSession();
  if (!s.data.session) { window.location.href = 'login.html'; return; }
  _uid = s.data.session.user.id;
  var user = s.data.session.user;
  var meta = user.user_metadata || {};
  var name = (meta.full_name || meta.name || '').trim();
  var sub = await _supa.from('subscriptions').select('plan,status').eq('user_id',_uid).single().then(function(r){return r.data;}).catch(function(){return null;});
  var isPro = sub && (sub.plan==='pro'||sub.plan==='clinic') && sub.status==='active';
  Shell.init({ page:'staff', title:'Personnel', isPro:isPro, plan:sub?.plan||'free', userName:name, userEmail:user.email||'' });
  loadStaff();
})();

async function loadStaff() {
  var { data, error } = await _supa.from('staff').select('*').eq('clinic_id',_uid).order('created_at',{ascending:false});
  if (error) { toast('Erreur de chargement','error'); return; }
  _staff = data || [];
  updateStats();
  renderStaff();
}

function updateStats() {
  var active = _staff.filter(function(s){ return s.active; });
  var sec    = _staff.filter(function(s){ return s.role==='secretaire'; });
  var nurses = _staff.filter(function(s){ return s.role==='infirmier'||s.role==='medecin_assistant'; });
  document.getElementById('stat-total').textContent      = _staff.length;
  document.getElementById('stat-active').textContent     = active.length;
  document.getElementById('stat-secretaires').textContent = sec.length;
  document.getElementById('stat-infirmiers').textContent  = nurses.length;
}

function renderStaff() {
  var grid = document.getElementById('staff-grid');
  var filtered = _staff.filter(function(s) {
    if (!_showInactive && !s.active) return false;
    if (_filterRole !== 'all' && s.role !== _filterRole) return false;
    return true;
  });
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" style="width:32px;height:32px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div class="empty-title">'+(_filterRole!=='all'?'Aucun membre dans cette catégorie':'Aucun membre du personnel')+'</div><div>'+(_staff.length===0?'Ajoutez votre équipe pour une meilleure organisation.':'Ajustez les filtres pour voir plus de résultats.')+'</div></div>';
    return;
  }
  grid.innerHTML = filtered.map(function(s, i) {
    var pal = AVATAR_COLORS[i % AVATAR_COLORS.length];
    var ini = ((s.first_name||'')[0]||'').toUpperCase() + ((s.last_name||'')[0]||'').toUpperCase();
    var roleLabel = ROLE_LABELS[s.role] || 'Autre';
    var roleIcon  = ROLE_ICONS[s.role] || '';
    return '<div class="staff-card'+(s.active?'':' inactive')+'">'+
      '<div class="staff-header">'+
        '<div class="staff-avatar" style="background:'+pal.bg+';color:'+pal.color+'">'+esc(ini)+'</div>'+
        '<div>'+
          '<div class="staff-name">'+esc(s.first_name+' '+s.last_name)+'</div>'+
          '<div class="staff-role-badge role-'+s.role+'">'+roleIcon+' '+esc(roleLabel)+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="staff-contact">'+
        (s.phone?'<div class="staff-contact-row"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.13 18a19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>'+esc(s.phone)+'</div>':'')+
        (s.email?'<div class="staff-contact-row"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>'+esc(s.email)+'</div>':'')+
        (s.notes?'<div class="staff-notes">'+esc(s.notes.slice(0,70))+(s.notes.length>70?'…':'')+'</div>':'')+
      '</div>'+
      '<div class="staff-footer">'+
        '<div class="staff-status"><div class="status-dot '+(s.active?'active':'inactive')+'"></div><span style="color:'+(s.active?'var(--success)':'var(--text4)')+';font-weight:600">'+(s.active?'Actif':'Inactif')+'</span></div>'+
        '<div class="staff-actions">'+
          '<button class="btn-icon" onclick="toggleActive(\''+s.id+'\','+((!s.active))+') " title="'+(s.active?'Désactiver':'Activer')+'">'+
            '<svg viewBox="0 0 24 24"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>'+
          '</button>'+
          '<button class="btn-icon" onclick="openModal(\''+s.id+'\')" title="Modifier">'+
            '<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>'+
          '</button>'+
          '<button class="btn-icon danger" onclick="deleteStaff(\''+s.id+'\')" title="Supprimer">'+
            '<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>'+
          '</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function setFilter(role, btn) {
  _filterRole = role;
  document.querySelectorAll('.filter-chip[data-role]').forEach(function(c){ c.classList.remove('active'); });
  btn.classList.add('active');
  renderStaff();
}
function toggleInactive(btn) {
  _showInactive = !_showInactive;
  btn.classList.toggle('active', _showInactive);
  btn.textContent = _showInactive ? 'Masquer inactifs' : 'Afficher inactifs';
  renderStaff();
}
function openModal(id) {
  _editId = id || null;
  document.getElementById('modal-title').textContent = id ? 'Modifier le membre' : 'Ajouter un membre';
  var s = id ? _staff.find(function(m){return m.id===id;}) : null;
  document.getElementById('f-first').value = s ? s.first_name : '';
  document.getElementById('f-last').value  = s ? s.last_name  : '';
  document.getElementById('f-role').value  = s ? s.role : 'secretaire';
  document.getElementById('f-phone').value = s ? (s.phone||'') : '';
  document.getElementById('f-email').value = s ? (s.email||'') : '';
  document.getElementById('f-notes').value = s ? (s.notes||'') : '';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(function(){document.getElementById('f-first').focus();},200);
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); _editId = null; }

async function saveStaff() {
  var first = document.getElementById('f-first').value.trim();
  var last  = document.getElementById('f-last').value.trim();
  if (!first || !last) { toast('Prénom et nom requis.','error'); return; }
  var btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Enregistrement…';
  var payload = {
    clinic_id: _uid, first_name:first, last_name:last, role:document.getElementById('f-role').value,
    phone: document.getElementById('f-phone').value.trim()||null,
    email: document.getElementById('f-email').value.trim()||null,
    notes: document.getElementById('f-notes').value.trim()||null,
  };
  var error;
  if (_editId) { var r = await _supa.from('staff').update(payload).eq('id',_editId); error=r.error; }
  else { payload.active = true; var r = await _supa.from('staff').insert(payload); error=r.error; }
  btn.disabled = false; btn.textContent = 'Enregistrer';
  if (error) { toast('Erreur : '+error.message,'error'); return; }
  toast(_editId?'Membre mis à jour.':'Membre ajouté.','success');
  closeModal(); loadStaff();
}
async function toggleActive(id, newActive) {
  var { error } = await _supa.from('staff').update({active:newActive}).eq('id',id);
  if (error) { toast('Erreur','error'); return; }
  toast(newActive?'Membre activé.':'Membre désactivé.');
  loadStaff();
}
async function deleteStaff(id) {
  var s = _staff.find(function(m){return m.id===id;});
  if (!confirm('Supprimer '+(s?s.first_name+' '+s.last_name:'ce membre')+' du personnel ?')) return;
  var { error } = await _supa.from('staff').delete().eq('id',id);
  if (error) { toast('Erreur','error'); return; }
  toast('Membre supprimé.'); loadStaff();
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast '+(type||'')+' show';
  setTimeout(function(){ t.className='toast'; }, 3200);
}
window.addEventListener('keydown',function(e){ if(e.key==='Escape') closeModal(); });
</script>
</body>
</html>
