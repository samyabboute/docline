[build]
  publish = "."

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    X-XSS-Protection        = "1; mode=block"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self' https://*.supabase.co https://cdn.jsdelivr.net https://js.stripe.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.stripe.com https://generativelanguage.googleapis.com;"

# ── Cache static assets ───────────────────────────────────────────────────────
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Clean URLs (sans .html) ───────────────────────────────────────────────────
[[redirects]]
  from   = "/login"
  to     = "/login.html"
  status = 200

[[redirects]]
  from   = "/dashboard"
  to     = "/app.html"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200

[[redirects]]
  from   = "/pricing"
  to     = "/pricing.html"
  status = 200

[[redirects]]
  from   = "/patients"
  to     = "/patients.html"
  status = 200

[[redirects]]
  from   = "/calendar"
  to     = "/calendar.html"
  status = 200

[[redirects]]
  from   = "/book"
  to     = "/book.html"
  status = 200

[[redirects]]
  from   = "/privacy"
