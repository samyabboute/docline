<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Welcome to Docline</title>
  <script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8FAFF;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{background:#fff;border-radius:16px;padding:48px;max-width:480px;width:90%;text-align:center;box-shadow:0 4px 24px rgba(0,51,153,.08)}
  .logo{font-size:28px;font-weight:800;color:#003399;letter-spacing:-1px;margin-bottom:8px}
  .logo span{color:#6366F1}
  h1{font-size:24px;font-weight:700;color:#0D1117;margin-bottom:8px}
  p{color:#6B7280;font-size:15px;line-height:1.6;margin-bottom:32px}
  .btn{display:inline-block;background:#003399;color:#fff;padding:14px 32px;border-radius:10px;font-size:16px;font-weight:600;text-decoration:none;cursor:pointer;border:none;width:100%;transition:opacity .2s}
  .btn:hover{opacity:.88}
  .steps{display:flex;gap:12px;margin-bottom:32px;justify-content:center}
  .step{flex:1;padding:16px;background:#F0F4FF;border-radius:10px;font-size:13px;color:#374151}
  .step-num{font-size:20px;font-weight:700;color:#003399;display:block;margin-bottom:4px}

  @media(max-width:600px){body{padding:16px}.container,.card{padding:16px;max-width:100%!important}}
</style>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link rel="stylesheet" href="docline-animations.css">
</head>
<body>
<div class="card">
  <div class="logo"><img src="docline-logo.svg" alt="Docline" style="height:28px;width:auto"></div>
  <h1>Welcome to Docline!</h1>
  <p>Your CRM is ready. Start by adding your first client and creating your first lead.</p>
  <div class="steps">
    <div class="step"><span class="step-num">1</span>Add a client</div>
    <div class="step"><span class="step-num">2</span>Create a lead</div>
    <div class="step"><span class="step-num">3</span>Send an invoice</div>
  </div>
  <button class="btn" onclick="goToDashboard()">Go to my dashboard</button>
</div>
<script>
var _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

async function goToDashboard() {
  var s = await _supa.auth.getSession();
  if (!s.data.session) { window.location.href = 'login.html'; return; }
  window.location.href = 'app.html';
}

// Auto-redirect: wait for session to be confirmed before starting the timer
(async function() {
  var s = await _supa.auth.getSession();
  if (s.data.session) {
    setTimeout(function() { window.location.href = 'app.html'; }, 3000);
  } else {
    // Session not ready yet (e.g. email confirmation flow) — wait for auth state
    var redirected = false;
    var sub = _supa.auth.onAuthStateChange(function(event, session) {
      if (redirected) return;
      if (session) {
        redirected = true;
        sub.data.subscription.unsubscribe();
        setTimeout(function() { window.location.href = 'app.html'; }, 3000);
      }
    });
    // Fallback: if no session after 6s, send to login
    setTimeout(function() {
      if (!redirected) { redirected = true; window.location.href = 'login.html'; }
    }, 6000);
  }
})();
</script>

<script src="docline-animations.js"></script>
</body>
</html>
