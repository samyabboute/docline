name: Deploy Beta → GitHub Pages

on:
  push:
    branches: [beta]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy src/pages → GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src/pages
          publish_branch: gh-pages
          commit_message: "chore: deploy beta [${{ github.sha }}]"
