<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mon ticket RDV — Docline</title>
<meta name="description" content="Votre ticket de rendez-vous médical Docline">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3B1772">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="config.js"></script>
<style>
:root{
  --brand:#3B1772;--brand-dark:#2D1259;
  --brand-light:#EDE8FF;--brand-glow:rgba(59,23,114,.14);
  --bg:#F0EDF8;--surface:#FFFFFF;
  --text-1:#0C1025;--text-2:#3D4461;--text-3:#6B7299;--text-4:#9CA3C4;
  --border:#E2E6F3;
  --success:#10B981;--success-bg:#ECFDF5;--success-border:#A7F3D0;
  --danger:#EF4444;--danger-bg:#FEF2F2;
  --shadow-brand:0 4px 24px rgba(59,23,114,.28);
  --r-md:10px;--r-lg:16px;--r-xl:20px;--r-full:9999px;
  --t:200ms cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'Sora',system-ui,sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px 16px 48px;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* ── LOGO ────────────────────────────────────────────────────────── */
.logo-bar{display:flex;align-items:center;gap:9px;font-weight:800;font-size:1.125rem;color:var(--brand);letter-spacing:-.4px;margin-bottom:32px;text-decoration:none}
.logo-bar svg{height:30px;width:auto}

/* ── TICKET CARD ─────────────────────────────────────────────────── */
.ticket{
  width:100%;max-width:400px;
  background:#fff;border-radius:24px;
  box-shadow:0 8px 48px rgba(59,23,114,.16),0 2px 8px rgba(0,0,0,.06);
  overflow:hidden;position:relative}

/* Top band */
.ticket-header{
  background:linear-gradient(135deg,var(--brand) 0%,#5B21B6 100%);
  padding:28px 24px 24px;text-align:center;color:#fff;position:relative}
.ticket-header::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;height:24px;
  background:#fff;border-radius:50% 50% 0 0 / 100% 100% 0 0}
.th-logo{font-size:1rem;font-weight:800;letter-spacing:-.3px;opacity:.9;margin-bottom:12px}
.th-status{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);
  border-radius:var(--r-full);padding:5px 14px;
  font-size:.8125rem;font-weight:700}
.th-status.confirmed{background:rgba(16,185,129,.25);border-color:rgba(16,185,129,.5)}
.th-status.cancelled{background:rgba(239,68,68,.25);border-color:rgba(239,68,68,.5)}
.th-status svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* Perforation */
.ticket-perf{
  display:flex;align-items:center;padding:0 16px;position:relative;z-index:1}
.perf-circle{width:22px;height:22px;border-radius:50%;background:var(--bg);flex-shrink:0}
.perf-line{flex:1;border-top:2px dashed var(--border);margin:0 8px}
.perf-circle2{width:22px;height:22px;border-radius:50%;background:var(--bg);flex-shrink:0}

/* Body */
.ticket-body{padding:20px 24px 24px}

.doctor-row{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.doc-av{
  width:52px;height:52px;border-radius:50%;
  background:var(--brand-light);color:var(--brand);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:1.1rem;flex-shrink:0;overflow:hidden}
.doc-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.doc-name{font-size:1rem;font-weight:800;color:var(--text-1);letter-spacing:-.3px}
.doc-spec{font-size:.8125rem;color:var(--text-3);margin-top:2px}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.info-item{background:var(--brand-light);border-radius:var(--r-lg);padding:12px 14px}
.info-label{font-size:.6875rem;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.info-val{font-size:.9375rem;font-weight:700;color:var(--text-1)}
.info-item.full{grid-column:1/-1}

/* QR code */
.qr-wrap{
  background:#fff;border:2px solid var(--border);
  border-radius:var(--r-xl);padding:16px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  margin-bottom:20px}
.qr-wrap canvas{display:block;border-radius:8px}
.qr-label{font-size:.6875rem;font-weight:700;color:var(--text-4);text-align:center;letter-spacing:.06em;text-transform:uppercase}

/* Cancelled overlay */
.cancelled-overlay{
  position:absolute;inset:0;background:rgba(239,68,68,.06);
  display:flex;align-items:center;justify-content:center;
  border-radius:24px;z-index:10}
.cancelled-badge{
  background:#FEF2F2;border:2px solid #FECACA;border-radius:var(--r-full);
  padding:10px 24px;font-size:1.125rem;font-weight:800;color:var(--danger);
  transform:rotate(-12deg);box-shadow:0 4px 16px rgba(239,68,68,.2)}

/* Bottom actions */
.ticket-actions{padding:0 24px 24px;display:flex;flex-direction:column;gap:10px}
.btn-share{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:12px;border-radius:var(--r-lg);border:none;cursor:pointer;
  font-family:'Sora',sans-serif;font-weight:700;font-size:.875rem;
  transition:all var(--t)}
.btn-share svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.btn-primary-action{background:var(--brand);color:#fff;box-shadow:var(--shadow-brand)}
.btn-primary-action:hover{background:var(--brand-dark);transform:translateY(-1px)}
.btn-secondary-action{background:var(--brand-light);color:var(--brand)}
.btn-secondary-action:hover{background:#DDD6FE}

/* Loading / Error */
.state-screen{
  width:100%;max-width:400px;background:#fff;border-radius:24px;
  box-shadow:0 8px 48px rgba(59,23,114,.12);padding:48px 24px;
  text-align:center}
.state-icon{width:64px;height:64px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center}
.state-icon.loading{background:var(--brand-light)}
.state-icon.error{background:var(--danger-bg)}
.state-icon svg{width:28px;height:28px}
.state-title{font-size:1.125rem;font-weight:800;color:var(--text-1);margin-bottom:8px}
.state-sub{font-size:.875rem;color:var(--text-3);line-height:1.6}
.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.footer-note{margin-top:24px;font-size:.75rem;color:var(--text-4);text-align:center;max-width:400px}

@media print {
  body{background:#fff;padding:0}
  .logo-bar,.ticket-actions,.footer-note{display:none}
  .ticket{box-shadow:none;border:1px solid #ddd;max-width:100%}
}
</style>
</head>
<body>

<a class="logo-bar" href="landing.html">
  <svg viewBox="0 0 120 40" fill="none">
    <rect x="2" y="2" width="36" height="36" rx="9" fill="#3B1772"/>
    <path d="M12 20h4l3-7 4 14 3-9 3 4h4" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="46" y="28" font-family="Sora,sans-serif" font-weight="800" font-size="18" fill="#3B1772">Docline</text>
  </svg>
</a>

<div id="root">
  <!-- Loading state -->
  <div class="state-screen" id="loadingState">
    <div class="state-icon loading">
      <svg class="spin" viewBox="0 0 24 24" fill="none" stroke="#3B1772" stroke-width="2" stroke-linecap="round">
        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
      </svg>
    </div>
    <div class="state-title">Chargement du ticket…</div>
    <div class="state-sub">Un instant SVP</div>
  </div>
</div>

<p class="footer-note" id="footerNote" style="display:none">
  🔒 Ce ticket est personnel. Ne le partagez qu'avec votre médecin lors de votre rendez-vous.
</p>

<script>
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const MONTHS_LONG = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const DAYS_FULL   = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];

async function init() {
  const params = new URLSearchParams(location.search);
  const token  = params.get('t');

  if (!token) {
    showError('Lien invalide', 'Ce lien de ticket n\'est pas valide.');
    return;
  }

  // Charger le RDV via ticket_token
  const { data: appt, error } = await _sb
    .from('appointments')
    .select(`
      id, patient_name, patient_phone, requested_date, requested_time,
      status, ticket_token, created_at,
      profiles:doctor_id (
        first_name, last_name, clinic_name, is_clinic, specialty,
        wilaya, city, avatar_url, address, phone_public
      )
    `)
    .eq('ticket_token', token)
    .single();

  if (error || !appt) {
    showError('Ticket introuvable', 'Ce ticket est invalide ou a expiré. Si votre RDV a été annulé, le ticket n\'est plus accessible.');
    return;
  }

  renderTicket(appt);
}

function renderTicket(appt) {
  const doc = appt.profiles;
  const doctorName = doc?.is_clinic
    ? doc.clinic_name
    : 'Dr. ' + [doc?.first_name, doc?.last_name].filter(Boolean).join(' ');

  const initials = doc?.is_clinic
    ? (doc.clinic_name?.slice(0,2) ?? 'CL').toUpperCase()
    : ((doc?.first_name?.[0] ?? '') + (doc?.last_name?.[0] ?? '')).toUpperCase();

  const d = new Date(appt.requested_date + 'T00:00:00');
  const jsDay = d.getDay();
  const dayIdx = jsDay === 0 ? 6 : jsDay - 1;
  const dateStr = `${DAYS_FULL[dayIdx]} ${d.getDate()} ${MONTHS_LONG[d.getMonth()]} ${d.getFullYear()}`;

  const isCancelled = appt.status === 'cancelled';
  const isCompleted = appt.status === 'completed';

  const statusLabel = {
    confirmed: '✓ Confirmé',
    pending:   '⏳ En attente',
    cancelled: '✗ Annulé',
    completed: '✓ Terminé',
  }[appt.status] ?? appt.status;

  const ticketId = appt.id.slice(0,8).toUpperCase();
  const pageUrl  = location.href;

  const html = `
    <div class="ticket">
      ${isCancelled ? '<div class="cancelled-overlay"><div class="cancelled-badge">ANNULÉ</div></div>' : ''}

      <div class="ticket-header">
        <div class="th-logo">🏥 Docline</div>
        <div class="th-status ${appt.status}">
          ${appt.status === 'confirmed' || appt.status === 'completed'
            ? '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'
            : appt.status === 'cancelled'
            ? '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
            : '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'}
          ${statusLabel}
        </div>
      </div>

      <div class="ticket-perf">
        <div class="perf-circle"></div>
        <div class="perf-line"></div>
        <div class="perf-circle2"></div>
      </div>

      <div class="ticket-body">

        <div class="doctor-row">
          <div class="doc-av">
            ${doc?.avatar_url
              ? `<img src="${doc.avatar_url}" alt="${doctorName}">`
              : initials || '?'}
          </div>
          <div>
            <div class="doc-name">${doctorName}</div>
            <div class="doc-spec">${[doc?.specialty, doc?.city ?? doc?.wilaya].filter(Boolean).join(' · ')}</div>
          </div>
        </div>

        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">📅 Date</div>
            <div class="info-val" style="font-size:.8rem">${dateStr}</div>
          </div>
          <div class="info-item">
            <div class="info-label">⏰ Heure</div>
            <div class="info-val">${appt.requested_time}</div>
          </div>
          <div class="info-item full">
            <div class="info-label">👤 Patient</div>
            <div class="info-val">${appt.patient_name}</div>
          </div>
          ${doc?.address ? `
          <div class="info-item full">
            <div class="info-label">📍 Adresse</div>
            <div class="info-val" style="font-size:.8rem">${doc.address}</div>
          </div>` : ''}
          <div class="info-item full">
            <div class="info-label">🎫 N° Ticket</div>
            <div class="info-val" style="font-size:.875rem;letter-spacing:.1em">${ticketId}</div>
          </div>
        </div>

        ${!isCancelled ? `
        <div class="qr-wrap" id="qrWrap">
          <canvas id="qrCanvas"></canvas>
          <div class="qr-label">Présentez ce QR code au cabinet</div>
        </div>` : ''}

      </div>
    </div>

    <div class="ticket-actions">
      ${!isCancelled && navigator.share ? `
      <button class="btn-share btn-primary-action" onclick="shareTicket('${pageUrl}', '${doctorName}', '${dateStr}', '${appt.requested_time}')">
        <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Partager mon ticket
      </button>` : ''}
      <button class="btn-share btn-secondary-action" onclick="window.print()">
        <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimer
      </button>
      <a class="btn-share btn-secondary-action" href="find-doctor.html">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Trouver un autre médecin
      </a>
    </div>
  `;

  document.getElementById('root').innerHTML = html;
  document.getElementById('footerNote').style.display = 'block';

  // Générer le QR code
  if (!isCancelled) {
    setTimeout(() => {
      const canvas = document.getElementById('qrCanvas');
      if (canvas) {
        QRCode.toCanvas(canvas, pageUrl, {
          width: 200,
          margin: 1,
          color: { dark: '#3B1772', light: '#ffffff' },
          errorCorrectionLevel: 'M',
        }, err => { if (err) console.warn('QR error:', err); });
      }
    }, 100);
  }

  // Titre de la page
  document.title = `Ticket RDV #${ticketId} — Docline`;
}

async function shareTicket(url, doctor, date, time) {
  try {
    await navigator.share({
      title: 'Mon ticket RDV — Docline',
      text: `RDV avec ${doctor}\n${date} à ${time}`,
      url,
    });
  } catch(e) {
    // Annulé par l'user ou non supporté
  }
}

function showError(title, message) {
  document.getElementById('root').innerHTML = `
    <div class="state-screen">
      <div class="state-icon error">
        <svg viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <div class="state-title">${title}</div>
      <div class="state-sub">${message}</div>
      <a href="find-doctor.html" style="display:inline-block;margin-top:20px;background:#3B1772;color:#fff;padding:10px 22px;border-radius:10px;font-weight:700;font-size:.875rem">
        Trouver un médecin
      </a>
    </div>`;
}

init();
</script>
</body>
</html>
