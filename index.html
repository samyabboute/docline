<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Prospeo — Santé connectée en Algérie</title>
  <meta name="description" content="Trouvez un médecin près de chez vous et prenez rendez-vous en ligne. Gratuit pour les patients."/>
  <!-- Instant redirect — no flash -->
  <meta http-equiv="refresh" content="0;url=find-doctor.html"/>
  <style>
    body{font-family:system-ui,sans-serif;background:#F8FAFF;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
    .wrap{text-align:center;color:#6B7280;font-size:14px}
    .dot{width:10px;height:10px;border-radius:50%;background:#003399;display:inline-block;animation:blink .8s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
  </style>
</head>
<body>
  <div class="wrap">
    <span class="dot"></span><span class="dot" style="animation-delay:.15s;margin:0 4px"></span><span class="dot" style="animation-delay:.3s"></span>
  </div>
  <script>window.location.replace('find-doctor.html');</script>
</body>
</html>
