<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agenda Clinique — Docline</title>
<script src="config.js"></script>
<script src="shell.js?v=3"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F8FAFF;min-height:100vh;color:#0D1117}

/* ── Layout ── */
.page-wrap{max-width:1320px;margin:0 auto;padding:24px 20px}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.page-title{font-size:22px;font-weight:800;color:#0D1117;letter-spacing:-.5px}
.page-sub{font-size:13px;color:#6B7280;margin-top:3px}
.header-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap}

/* ── Buttons ── */
.btn{padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
.btn-primary{background:#3B1772;color:#fff;box-shadow:0 1px 4px rgba(59,23,114,.25)}.btn-primary:hover{background:#2D1259}
.btn-ghost{background:#fff;border:1px solid #E5E7EB;color:#374151}.btn-ghost:hover{background:#F9FAFB}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-danger{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}.btn-danger:hover{background:#FEE2E2}

/* ── KPI pills ── */
.kpi-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.kpi-pill{background:#fff;border:1px solid #E5E7EB;border-radius:16px;padding:14px 18px;display:flex;align-items:center;gap:12px;flex:1;min-width:130px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.kpi-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-icon svg{width:18px;height:18px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.kpi-icon.purple{background:#EDE8FF;stroke:#3B1772}.kpi-icon.purple svg{stroke:#3B1772}
.kpi-icon.blue{background:#EFF6FF}.kpi-icon.blue svg{stroke:#2563EB}
.kpi-icon.green{background:#ECFDF5}.kpi-icon.green svg{stroke:#059669}
.kpi-icon.amber{background:#FFFBEB}.kpi-icon.amber svg{stroke:#D97706}
.kpi-val{font-size:22px;font-weight:800;color:#0D1117;line-height:1}
.kpi-label{font-size:11px;color:#6B7280;margin-top:2px}

/* ── Doctor pills (filtre) ── */
.doctors-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.doctors-bar-label{font-size:12px;font-weight:600;color:#6B7280;margin-right:4px;white-space:nowrap}
.doc-pill{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .15s;background:#fff;color:#374151;border-color:#E5E7EB;user-select:none}
.doc-pill:hover{border-color:#3B1772;color:#3B1772}
.doc-pill.active{color:#fff;border-color:transparent}
.doc-pill .doc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.doc-pill .doc-count{background:rgba(255,255,255,.25);border-radius:99px;padding:1px 6px;font-size:10px}

/* ── Calendar nav ── */
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.cal-nav-title{font-size:17px;font-weight:800;color:#0D1117;flex:1;text-align:center;letter-spacing:-.3px}
.cal-nav-btn{width:34px;height:34px;border-radius:10px;border:1px solid #E5E7EB;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#374151;transition:all .14s}
.cal-nav-btn:hover{background:#F3F0FF;border-color:#3B1772;color:#3B1772}
.cal-nav-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round}
.today-btn{padding:6px 14px;border-radius:10px;border:1px solid #E5E7EB;background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:#374151;transition:all .14s;font-family:inherit}
.today-btn:hover{background:#3B1772;border-color:#3B1772;color:#fff}

/* ── Main grid ── */
.main-grid{display:grid;grid-template-columns:1fr 320px;gap:20px}
@media(max-width:1100px){.main-grid{grid-template-columns:1fr}}

/* ── Calendar ── */
.cal-card{background:#fff;border:1px solid #E5E7EB;border-radius:20px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:#9CA3AF;padding:10px 0;border-bottom:1px solid #F3F4F6;letter-spacing:.5px;text-transform:uppercase}
.cal-cell{min-height:90px;padding:6px 7px;border-right:1px solid #F3F4F6;border-bottom:1px solid #F3F4F6;cursor:pointer;transition:background .12s;position:relative;vertical-align:top}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:#F8F7FF}
.cal-cell.other-month{background:#FAFAFA}
.cal-cell.other-month .cal-num{color:#D1D5DB}
.cal-cell.today{background:#F3F0FF}
.cal-cell.today .cal-num{background:#3B1772;color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800}
.cal-cell.selected{background:#EDE8FF}
.cal-num{font-size:12px;font-weight:700;color:#374151;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.ev-dot{font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;line-height:1.4}
.more-badge{font-size:9px;color:#9CA3AF;font-weight:600;padding-left:2px}

/* ── Day Panel ── */
.day-panel{background:#fff;border:1px solid #E5E7EB;border-radius:20px;box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden;display:flex;flex-direction:column}
.day-panel-head{padding:18px 20px;border-bottom:1px solid #F3F4F6}
.day-panel-date{font-size:15px;font-weight:800;color:#0D1117;letter-spacing:-.3px}
.day-panel-sub{font-size:12px;color:#6B7280;margin-top:3px}
.day-panel-body{flex:1;overflow-y:auto;padding:14px}
.rdv-item{display:flex;gap:10px;padding:10px 12px;border-radius:12px;background:#F9FAFB;border:1px solid #F3F4F6;margin-bottom:8px;cursor:pointer;transition:all .14s}
.rdv-item:hover{background:#F3F0FF;border-color:#C4B5F4}
.rdv-bar{width:4px;border-radius:2px;flex-shrink:0;min-height:36px}
.rdv-time{font-size:11px;font-weight:700;color:#6B7280;white-space:nowrap;margin-bottom:2px}
.rdv-name{font-size:13px;font-weight:700;color:#0D1117}
.rdv-doctor{font-size:11px;font-weight:600;margin-top:3px}
.rdv-status{display:inline-flex;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;margin-top:4px}
.status-pending{background:#FFFBEB;color:#D97706}
.status-confirmed{background:#ECFDF5;color:#059669}
.status-cancelled{background:#FEF2F2;color:#DC2626}
.status-completed{background:#EDE8FF;color:#3B1772}
.day-empty{text-align:center;padding:40px 20px;color:#9CA3AF;font-size:13px}
.day-empty svg{width:36px;height:36px;fill:none;stroke:#D1D5DB;stroke-width:1.5;margin-bottom:10px}

/* ── Add Doctor Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden}
.modal-head{padding:20px 24px;border-bottom:1px solid #F3F4F6;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:800;color:#0D1117}
.modal-close{width:30px;height:30px;border-radius:8px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9CA3AF;font-size:18px;line-height:1}
.modal-close:hover{background:#F3F4F6;color:#374151}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.modal-foot{padding:14px 24px;border-top:1px solid #F3F4F6;display:flex;gap:10px;justify-content:flex-end}
.form-group{display:flex;flex-direction:column;gap:6px}
label{font-size:12px;font-weight:700;color:#374151}
.form-input{padding:10px 12px;border:1.5px solid #E5E7EB;border-radius:10px;font-size:13px;font-family:inherit;color:#0D1117;transition:border-color .14s;outline:none;width:100%}
.form-input:focus{border-color:#3B1772;box-shadow:0 0 0 3px rgba(59,23,114,.08)}
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .14s}
.color-swatch.selected{border-color:#0D1117;transform:scale(1.15)}

/* ── Toast ── */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1F2937;color:#fff;padding:12px 16px;border-radius:12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;min-width:220px;box-shadow:0 4px 20px rgba(0,0,0,.2);animation:slideIn .25s ease}
.toast.success{background:#059669}.toast.error{background:#DC2626}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}

/* ── Responsive ── */
@media(max-width:600px){
  .page-wrap{padding:14px}
  .kpi-row{gap:8px}
  .kpi-pill{padding:10px 12px;min-width:100px}
  .kpi-val{font-size:18px}
  .cal-cell{min-height:56px;padding:4px}
  .ev-dot{display:none}
  .cal-num{font-size:11px}
}
</style>
</head>
<body>
<div id="shell-topbar"></div>
<div id="shell-sidebar"></div>
<div id="shell-mobile-nav"></div>

<div class="page-wrap">

  <!-- Header -->
  <div class="page-header">
    <div>
      <div class="page-title" id="clinic-title">Agenda Clinique</div>
      <div class="page-sub" id="clinic-sub">Vue partagée de tous les praticiens</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm" onclick="openAddDoctor()">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="23" y2="8"/><line x1="21" y1="6" x2="21" y2="10"/></svg>
        Ajouter un médecin
      </button>
      <button class="btn btn-primary btn-sm" onclick="window.location.href='/mes-rdv'">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nouveau RDV
      </button>
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpi-row">
    <div class="kpi-pill">
      <div class="kpi-icon purple"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
      <div><div class="kpi-val" id="kpi-doctors">—</div><div class="kpi-label">Praticiens</div></div>
    </div>
    <div class="kpi-pill">
      <div class="kpi-icon blue"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
      <div><div class="kpi-val" id="kpi-today">—</div><div class="kpi-label">RDV aujourd'hui</div></div>
    </div>
    <div class="kpi-pill">
      <div class="kpi-icon green"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div><div class="kpi-val" id="kpi-month">—</div><div class="kpi-label">RDV ce mois</div></div>
    </div>
    <div class="kpi-pill">
      <div class="kpi-icon amber"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <div><div class="kpi-val" id="kpi-pending">—</div><div class="kpi-label">En attente</div></div>
    </div>
  </div>

  <!-- Doctor filter pills -->
  <div class="doctors-bar" id="doctors-bar">
    <span class="doctors-bar-label">Filtrer :</span>
    <div class="doc-pill active" id="pill-all" onclick="filterDoctor('all')" style="background:#3B1772;border-color:#3B1772">
      <div class="doc-dot" style="background:rgba(255,255,255,.5)"></div>
      Tous
      <span class="doc-count" id="count-all">0</span>
    </div>
  </div>

  <!-- Cal nav -->
  <div class="cal-nav">
    <button class="cal-nav-btn" onclick="prevMonth()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="cal-nav-title" id="cal-nav-title">—</div>
    <button class="cal-nav-btn" onclick="nextMonth()">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="today-btn" onclick="goToday()">Aujourd'hui</button>
  </div>

  <!-- Main grid -->
  <div class="main-grid">

    <!-- Calendar -->
    <div class="cal-card">
      <div class="cal-grid" id="cal-dow-row">
        <div class="cal-dow">Lun</div><div class="cal-dow">Mar</div><div class="cal-dow">Mer</div>
        <div class="cal-dow">Jeu</div><div class="cal-dow">Ven</div><div class="cal-dow">Sam</div><div class="cal-dow">Dim</div>
      </div>
      <div class="cal-grid" id="cal-body"></div>
    </div>

    <!-- Day panel -->
    <div class="day-panel">
      <div class="day-panel-head">
        <div class="day-panel-date" id="day-panel-date">Sélectionnez un jour</div>
        <div class="day-panel-sub" id="day-panel-sub"></div>
      </div>
      <div class="day-panel-body" id="day-panel-body">
        <div class="day-empty">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <div>Cliquez sur un jour<br>pour voir les RDV</div>
        </div>
      </div>
    </div>

  </div><!-- /main-grid -->
</div><!-- /page-wrap -->

<!-- ── Add Doctor Modal ── -->
<div class="modal-overlay" id="modal-add-doctor">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Ajouter un praticien à la clinique</div>
      <button class="modal-close" onclick="closeAddDoctor()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Email du médecin (compte Docline existant)</label>
        <input class="form-input" id="add-email" type="email" placeholder="dr.nom@email.com" autocomplete="off">
      </div>
      <div class="form-group">
        <label>Couleur dans l'agenda</label>
        <div class="color-row" id="color-row">
          <div class="color-swatch selected" style="background:#3B1772" data-color="#3B1772" onclick="selectColor(this)"></div>
          <div class="color-swatch" style="background:#0066FF" data-color="#0066FF" onclick="selectColor(this)"></div>
          <div class="color-swatch" style="background:#059669" data-color="#059669" onclick="selectColor(this)"></div>
          <div class="color-swatch" style="background:#D97706" data-color="#D97706" onclick="selectColor(this)"></div>
          <div class="color-swatch" style="background:#DC2626" data-color="#DC2626" onclick="selectColor(this)"></div>
          <div class="color-swatch" style="background:#7C3AED" data-color="#7C3AED" onclick="selectColor(this)"></div>
          <div class="color-swatch" style="background:#DB2777" data-color="#DB2777" onclick="selectColor(this)"></div>
          <div class="color-swatch" style="background:#0891B2" data-color="#0891B2" onclick="selectColor(this)"></div>
        </div>
      </div>
      <div id="add-error" style="color:#DC2626;font-size:12px;display:none"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeAddDoctor()">Annuler</button>
      <button class="btn btn-primary" id="btn-add-doc" onclick="addDoctor()">Ajouter</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
'use strict';

var _supa = supabase.createClient(SUPA_URL, SUPA_KEY);
var _uid = null, _clinicName = '';
var _doctors = [];        // [{id, name, color, specialty}] — owner + members
var _appointments = [];   // tous les RDV chargés
var _filterDoctorId = 'all';
var _selectedDate = null;
var _today = new Date(); _today.setHours(0,0,0,0);
var _viewYear = _today.getFullYear(), _viewMonth = _today.getMonth();
var _selectedColor = '#3B1772';

var MONTH_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

/* ── Toast ── */
function toast(msg, type) {
  var c = document.getElementById('toast-container');
  var t = document.createElement('div');
  t.className = 'toast ' + (type||'');
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function(){ t.remove(); }, 3500);
}

/* ── Sanitize ── */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── Modal ── */
function openAddDoctor(){
  document.getElementById('add-email').value='';
  document.getElementById('add-error').style.display='none';
  // Auto-select next available color
  var used = _doctors.map(function(d){return d.color;});
  var all = ['#3B1772','#0066FF','#059669','#D97706','#DC2626','#7C3AED','#DB2777','#0891B2'];
  var next = all.find(function(c){return !used.includes(c);}) || all[0];
  selectColorByValue(next);
  document.getElementById('modal-add-doctor').classList.add('open');
  document.getElementById('add-email').focus();
}
function closeAddDoctor(){ document.getElementById('modal-add-doctor').classList.remove('open'); }
function selectColor(el){
  document.querySelectorAll('.color-swatch').forEach(function(s){ s.classList.remove('selected'); });
  el.classList.add('selected');
  _selectedColor = el.dataset.color;
}
function selectColorByValue(val){
  document.querySelectorAll('.color-swatch').forEach(function(s){
    s.classList.toggle('selected', s.dataset.color === val);
  });
  _selectedColor = val;
}

/* ── Add doctor ── */
async function addDoctor(){
  var email = (document.getElementById('add-email').value||'').trim().toLowerCase();
  var errEl = document.getElementById('add-error');
  errEl.style.display = 'none';
  if(!email){ errEl.textContent = 'Saisissez un email.'; errEl.style.display='block'; return; }

  var btn = document.getElementById('btn-add-doc');
  btn.disabled = true; btn.textContent = '…';

  try {
    // Rechercher le profil par email
    var { data: prof, error: profErr } = await _supa
      .from('profiles')
      .select('id,full_name,specialty,email')
      .eq('email', email)
      .single();

    if(profErr || !prof){
      errEl.textContent = 'Aucun compte Docline trouvé pour cet email.';
      errEl.style.display = 'block';
      return;
    }
    if(prof.id === _uid){
      errEl.textContent = 'Vous êtes déjà le propriétaire de cette clinique.';
      errEl.style.display = 'block';
      return;
    }
    if(_doctors.find(function(d){return d.id===prof.id;})){
      errEl.textContent = 'Ce médecin est déjà dans votre clinique.';
      errEl.style.display = 'block';
      return;
    }

    var { error: insErr } = await _supa.from('clinic_doctors').insert({
      clinic_id: _uid,
      doctor_id: prof.id,
      color: _selectedColor
    });
    if(insErr) throw insErr;

    // Ajouter localement
    _doctors.push({ id: prof.id, name: prof.full_name || email, color: _selectedColor, specialty: prof.specialty || '' });
    closeAddDoctor();
    renderDoctorPills();
    await loadAppointments();
    renderCalendar();
    updateKPIs();
    toast((prof.full_name || email) + ' ajouté à la clinique.', 'success');
  } catch(e){
    errEl.textContent = 'Erreur : ' + e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Ajouter';
  }
}

/* ── Doctor pills ── */
function renderDoctorPills(){
  var bar = document.getElementById('doctors-bar');
  // Keep label + "Tous" pill, remove old doctor pills
  var existing = bar.querySelectorAll('.doc-pill:not(#pill-all)');
  existing.forEach(function(p){ p.remove(); });

  _doctors.forEach(function(doc){
    var pill = document.createElement('div');
    pill.className = 'doc-pill' + (_filterDoctorId === doc.id ? ' active' : '');
    pill.id = 'pill-' + doc.id;
    if(_filterDoctorId === doc.id) pill.style.background = doc.color;
    var rdvCount = _appointments.filter(function(a){ return a.doctor_id === doc.id; }).length;
    pill.innerHTML = '<div class="doc-dot" style="background:'+doc.color+'"></div>'
      + esc(doc.name.split(' ')[0])
      + '<span class="doc-count" style="background:rgba(0,0,0,.1)">'+rdvCount+'</span>';
    pill.onclick = (function(id){ return function(){ filterDoctor(id); }; })(doc.id);
    bar.appendChild(pill);
  });

  // Update "Tous" count
  var allCount = filteredAppointments('all').length;
  document.getElementById('count-all').textContent = allCount;

  // Highlight active
  var pillAll = document.getElementById('pill-all');
  if(_filterDoctorId === 'all'){
    pillAll.classList.add('active');
    pillAll.style.background='#3B1772'; pillAll.style.borderColor='#3B1772';
  } else {
    pillAll.classList.remove('active');
    pillAll.style.background=''; pillAll.style.borderColor='';
  }
}

function filterDoctor(id){
  _filterDoctorId = id;
  renderDoctorPills();
  renderCalendar();
  if(_selectedDate) showDay(_selectedDate);
}

/* ── Filtered appointments ── */
function filteredAppointments(doctorId){
  var id = doctorId !== undefined ? doctorId : _filterDoctorId;
  if(id === 'all') return _appointments;
  return _appointments.filter(function(a){ return a.doctor_id === id; });
}

/* ── Calendar ── */
function renderCalendar(){
  var body = document.getElementById('cal-body');
  var title = document.getElementById('cal-nav-title');
  title.textContent = MONTH_FR[_viewMonth] + ' ' + _viewYear;

  var firstDay = new Date(_viewYear, _viewMonth, 1);
  var lastDay  = new Date(_viewYear, _viewMonth + 1, 0);

  // Monday-first offset
  var startDow = (firstDay.getDay() + 6) % 7;

  // Build event map per date
  var eventMap = {};
  filteredAppointments().forEach(function(a){
    if(!a.requested_date) return;
    var k = a.requested_date.slice(0,10);
    if(!eventMap[k]) eventMap[k] = [];
    eventMap[k].push(a);
  });

  var cells = '';
  // Blanks before
  for(var b=0;b<startDow;b++){
    var prevDate = new Date(_viewYear, _viewMonth, -startDow+b+1);
    cells += '<div class="cal-cell other-month"><div class="cal-num">'+prevDate.getDate()+'</div></div>';
  }

  for(var d=1; d<=lastDay.getDate(); d++){
    var dt = new Date(_viewYear, _viewMonth, d);
    var dateStr = dt.toISOString().slice(0,10);
    var isToday = dt.getTime()===_today.getTime();
    var isSel   = _selectedDate === dateStr;
    var cls = 'cal-cell' + (isToday?' today':'') + (isSel?' selected':'');
    var numHtml = isToday
      ? '<div class="cal-num"><div style="background:#3B1772;color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px">'+d+'</div></div>'
      : '<div class="cal-num">'+d+'</div>';

    var evs = eventMap[dateStr] || [];
    var evHtml = evs.slice(0,2).map(function(a){
      var doc = _doctors.find(function(doc){ return doc.id===a.doctor_id; });
      var color = doc ? doc.color : '#3B1772';
      var name = (a.patient_name||'Patient').split(' ')[0];
      var time = a.requested_time ? a.requested_time.slice(0,5)+' ' : '';
      return '<div class="ev-dot" style="background:'+color+'22;color:'+color+'" title="'+esc(time+a.patient_name)+'">'+esc(time+name)+'</div>';
    }).join('');
    if(evs.length>2) evHtml += '<div class="more-badge">+' + (evs.length-2) + ' autres</div>';

    cells += '<div class="'+cls+'" onclick="showDay(\''+dateStr+'\')">' + numHtml + evHtml + '</div>';
  }

  // Blanks after
  var totalCells = startDow + lastDay.getDate();
  var remainder = totalCells % 7;
  if(remainder !== 0){
    for(var a2=1; a2<=(7-remainder); a2++){
      cells += '<div class="cal-cell other-month"><div class="cal-num">'+a2+'</div></div>';
    }
  }

  body.innerHTML = cells;
}

function showDay(dateStr){
  _selectedDate = dateStr;

  // Re-render calendar to update selected state
  renderCalendar();

  var dt = new Date(dateStr + 'T00:00:00');
  document.getElementById('day-panel-date').textContent = dt.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  var dayAppts = filteredAppointments().filter(function(a){
    return a.requested_date && a.requested_date.slice(0,10) === dateStr;
  });
  dayAppts.sort(function(a,b){ return (a.requested_time||'').localeCompare(b.requested_time||''); });

  document.getElementById('day-panel-sub').textContent = dayAppts.length + ' rendez-vous';

  var body = document.getElementById('day-panel-body');
  if(!dayAppts.length){
    body.innerHTML = '<div class="day-empty"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><div>Aucun RDV ce jour</div></div>';
    return;
  }

  body.innerHTML = dayAppts.map(function(a){
    var doc = _doctors.find(function(d){ return d.id===a.doctor_id; });
    var color = doc ? doc.color : '#3B1772';
    var docName = doc ? 'Dr. '+doc.name : '';
    var time = a.requested_time ? a.requested_time.slice(0,5) : '—';
    var statusCls = 'status-'+(a.status||'pending');
    var statusLbl = {pending:'En attente',confirmed:'Confirmé',cancelled:'Annulé',completed:'Terminé'}[a.status||'pending'] || a.status;
    return '<div class="rdv-item">'
      + '<div class="rdv-bar" style="background:'+color+'"></div>'
      + '<div style="flex:1;min-width:0">'
      + '<div class="rdv-time">'+esc(time)+'</div>'
      + '<div class="rdv-name">'+esc(a.patient_name||'—')+'</div>'
      + (docName ? '<div class="rdv-doctor" style="color:'+color+'">'+esc(docName)+'</div>' : '')
      + '<span class="rdv-status '+statusCls+'">'+esc(statusLbl)+'</span>'
      + '</div></div>';
  }).join('');
}

/* ── Nav ── */
function prevMonth(){ _viewMonth--; if(_viewMonth<0){_viewMonth=11;_viewYear--;} renderCalendar(); }
function nextMonth(){ _viewMonth++; if(_viewMonth>11){_viewMonth=0;_viewYear++;} renderCalendar(); }
function goToday(){ _viewYear=_today.getFullYear(); _viewMonth=_today.getMonth(); renderCalendar(); showDay(_today.toISOString().slice(0,10)); }

/* ── KPIs ── */
function updateKPIs(){
  var todayStr = _today.toISOString().slice(0,10);
  var monthStr = _viewYear+'-'+String(_viewMonth+1).padStart(2,'0');
  var all = filteredAppointments('all');
  document.getElementById('kpi-doctors').textContent = _doctors.length;
  document.getElementById('kpi-today').textContent  = all.filter(function(a){ return a.requested_date && a.requested_date.slice(0,10)===todayStr; }).length;
  document.getElementById('kpi-month').textContent  = all.filter(function(a){ return a.requested_date && a.requested_date.slice(0,7)===monthStr; }).length;
  document.getElementById('kpi-pending').textContent= all.filter(function(a){ return a.status==='pending'; }).length;
}

/* ── Load ── */
async function loadClinicDoctors(){
  // Owner = first entry
  var { data: ownProf } = await _supa.from('profiles').select('id,full_name,specialty,clinic_name').eq('id',_uid).single();
  _clinicName = (ownProf && ownProf.clinic_name) ? ownProf.clinic_name : 'Ma Clinique';
  document.getElementById('clinic-title').textContent = _clinicName;
  document.getElementById('clinic-sub').textContent = 'Agenda partagé — tous les praticiens';

  _doctors = [];
  // Add owner as first doctor
  _doctors.push({
    id: _uid,
    name: (ownProf && ownProf.full_name) || 'Vous',
    color: '#3B1772',
    specialty: (ownProf && ownProf.specialty) || ''
  });

  // Load clinic members
  var { data: members } = await _supa
    .from('clinic_doctors')
    .select('doctor_id, color, profiles!clinic_doctors_doctor_id_fkey(id,full_name,specialty)')
    .eq('clinic_id', _uid);

  if(members && members.length){
    members.forEach(function(m){
      var prof = m.profiles;
      _doctors.push({
        id: m.doctor_id,
        name: (prof && prof.full_name) || m.doctor_id,
        color: m.color || '#0066FF',
        specialty: (prof && prof.specialty) || ''
      });
    });
  }
}

async function loadAppointments(){
  var doctorIds = _doctors.map(function(d){ return d.id; });
  var { data, error } = await _supa
    .from('appointments')
    .select('id,doctor_id,patient_name,patient_phone,requested_date,requested_time,status,notes')
    .in('doctor_id', doctorIds)
    .order('requested_date', { ascending: true })
    .order('requested_time', { ascending: true });

  if(error){ console.error('[loadAppointments]', error); toast('Erreur chargement RDV','error'); }
  _appointments = data || [];
}

/* ── Init ── */
(async function init(){
  try {
    var { data: { session } } = await _supa.auth.getSession();
    if(!session){ window.location.href = ghpNav('/login'); return; }
    _uid = session.user.id;

    var meta = session.user.user_metadata || {};
    var subR = await _supa.from('subscriptions').select('plan,status').eq('user_id',_uid).maybeSingle();
    var sub  = subR.data;

    Shell.init({
      page: 'clinic-agenda',
      user: session.user,
      meta: meta,
      sub: sub,
      supa: _supa
    });

    // Guard Clinic only
    if(!sub || sub.plan !== 'clinic' || sub.status !== 'active'){
      document.querySelector('.page-wrap').innerHTML =
        '<div style="text-align:center;padding:80px 20px;color:#6B7280">'
        + '<div style="font-size:48px;margin-bottom:16px">🔒</div>'
        + '<div style="font-size:20px;font-weight:800;color:#0D1117;margin-bottom:8px">Fonctionnalité Clinic</div>'
        + '<div style="margin-bottom:24px">L\'agenda partagé est réservé au plan Clinic.</div>'
        + '<a href="/pricing" class="btn btn-primary" style="display:inline-flex">Passer au plan Clinic</a>'
        + '</div>';
      return;
    }

    await loadClinicDoctors();
    await loadAppointments();
    renderDoctorPills();
    renderCalendar();
    updateKPIs();

    // Show today's appointments by default
    showDay(_today.toISOString().slice(0,10));

  } catch(e){
    console.error('[init]', e);
    toast('Erreur de chargement : ' + e.message, 'error');
  }
})();
</script>
