<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Paiement — Docline</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#3B1772">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#3B1772;--brand-dark:#2D1259;--brand-light:#EDE8FF;
  --bg:#F4F7FF;--surface:#fff;--text:#0D1117;--text2:#374151;--text3:#6B7280;
  --success:#059669;--success-bg:#ECFDF5;--success-border:#A7F3D0;
  --danger:#DC2626;--danger-bg:#FEF2F2;--danger-border:#FECACA;
  --r:12px;--rlg:18px;--rfull:999px;
  --shadow-lg:0 12px 40px rgba(0,0,0,.12);
}
html{-webkit-font-smoothing:antialiased}
body{font-family:'Sora',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}

.card{background:var(--surface);border-radius:var(--rlg);box-shadow:var(--shadow-lg);padding:48px 40px;max-width:480px;width:100%;text-align:center;animation:popIn .45s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(16px)}to{opacity:1;transform:none}}

.icon-wrap{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:36px}
.icon-wrap.success{background:var(--success-bg);border:2px solid var(--success-border)}
.icon-wrap.error{background:var(--danger-bg);border:2px solid var(--danger-border)}

h1{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:10px}
.subtitle{font-size:14px;color:var(--text3);line-height:1.6;margin-bottom:32px}

.detail-box{background:var(--bg);border-radius:var(--r);padding:16px 20px;margin-bottom:28px;text-align:left}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px}
.detail-row:not(:last-child){border-bottom:1px solid #E4E8F0}
.detail-label{color:var(--text3)}
.detail-value{font-weight:700;color:var(--text)}

.btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:var(--r);font-family:inherit;font-size:15px;font-weight:700;background:var(--brand);color:#fff;border:none;cursor:pointer;transition:all .2s;text-decoration:none;margin-bottom:12px}
.btn-primary:hover{background:var(--brand-dark);transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,23,114,.3)}
.btn-secondary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:600;background:var(--bg);color:var(--text2);border:1.5px solid #E4E8F0;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-secondary:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-light)}

.pending-notice{background:#FFFAEB;border:1px solid #FEF3C7;border-radius:var(--r);padding:14px 16px;margin-bottom:20px;font-size:13px;color:#92400E;line-height:1.55;text-align:left}
.pending-notice strong{display:block;margin-bottom:4px;font-size:13px}

.logo{display:flex;align-items:center;justify-content:center;gap:8px;font-size:17px;font-weight:800;color:var(--text);margin-bottom:40px;text-decoration:none}
.logo-mark{width:28px;height:28px;background:linear-gradient(135deg,#3B1772,#23A7EA);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff}

.spinner{width:24px;height:24px;border:3px solid rgba(59,23,114,.2);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{text-align:center;color:var(--text3);font-size:14px}

.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:0}
.confetti-piece{position:absolute;width:8px;height:8px;top:-10px;opacity:.9;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
<script src="loader.js"></script>
</head>
<body>

<div class="confetti" id="confetti"></div>

<a href="app.html" class="logo">
  <img src="docline-logo.svg" alt="Docline" style="height:30px;width:auto">
</a>

<div class="card" id="card">
  <div class="loading-state" id="loading-state">
    <div class="spinner"></div>
    Vérification du paiement…
  </div>
  <div id="main-content" style="display:none"></div>
</div>

<script>
var _supa = supabase.createClient(SUPA_URL, SUPA_KEY);

var params = new URLSearchParams(window.location.search);
var status  = params.get('status');
var plan    = params.get('plan');
var billing = params.get('billing');

var PLAN_LABELS = { pro: 'Pro Médecin', enterprise: 'Pro Clinique' };
var BILLING_LABELS = { monthly: 'Mensuel', yearly: 'Annuel' };
var AMOUNTS = {
  pro:        { monthly: '2 900 DA', yearly: '29 000 DA/an' },
  enterprise: { monthly: '7 900 DA', yearly: '79 000 DA/an' },
};

function renderSuccess() {
  var planLabel    = PLAN_LABELS[plan] || plan || '—';
  var billingLabel = BILLING_LABELS[billing] || billing || '—';
  var amountLabel  = (AMOUNTS[plan] && AMOUNTS[plan][billing]) ? AMOUNTS[plan][billing] : '—';

  spawnConfetti();

  document.getElementById('main-content').innerHTML = `
    <div class="icon-wrap success"><svg viewBox="0 0 24 24" style="width:36px;height:36px;fill:none;stroke:#059669;stroke-width:2.5;stroke-linecap:round"><polyline points="20 6 9 17 4 12"/></svg></div>
    <h1>Paiement confirmé !</h1>
    <p class="subtitle">Votre abonnement a été activé automatiquement. Bon retour dans Docline !</p>
    <div class="detail-box">
      <div class="detail-row">
        <span class="detail-label">Plan</span>
        <span class="detail-value">${planLabel}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Facturation</span>
        <span class="detail-value">${billingLabel}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Montant</span>
        <span class="detail-value">${amountLabel}</span>
      </div>
    </div>
    <a href="queue.html" class="btn-primary">
      <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round"><polyline points="13 17 18 12 13 7"/><line x1="6" y1="12" x2="18" y2="12"/></svg>
      Accéder à la file d'attente
    </a>
    <a href="app.html" class="btn-secondary">Tableau de bord</a>
  `;
}

function renderPending() {
  var planLabel    = PLAN_LABELS[plan] || plan || '—';
  var billingLabel = BILLING_LABELS[billing] || billing || '—';

  document.getElementById('main-content').innerHTML = `
    <div class="icon-wrap" style="background:#FEF3C7;border:2px solid #FDE68A;font-size:0"><svg viewBox="0 0 24 24" style="width:36px;height:36px;fill:none;stroke:#D97706;stroke-width:2.5;stroke-linecap:round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
    <h1>Demande en attente</h1>
    <p class="subtitle">Votre demande a bien été reçue. Elle sera traitée sous 24h ouvrées.</p>
    <div class="pending-notice">
      <strong>Prochaine étape</strong>
      Notre équipe va vérifier votre paiement et activer votre plan. Vous recevrez une confirmation par email.
    </div>
    <div class="detail-box">
      <div class="detail-row">
        <span class="detail-label">Plan demandé</span>
        <span class="detail-value">${planLabel}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Facturation</span>
        <span class="detail-value">${billingLabel}</span>
      </div>
    </div>
    <a href="app.html" class="btn-primary">Retour au tableau de bord</a>
    <a href="pricing.html" class="btn-secondary">Voir les tarifs</a>
  `;
}

function renderError() {
  document.getElementById('main-content').innerHTML = `
    <div class="icon-wrap error"><svg viewBox="0 0 24 24" style="width:36px;height:36px;fill:none;stroke:#DC2626;stroke-width:2.5;stroke-linecap:round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
    <h1>Paiement échoué</h1>
    <p class="subtitle">Le paiement n'a pas pu être traité. Aucun montant n'a été débité. Vous pouvez réessayer.</p>
    <a href="pricing.html" class="btn-primary">Réessayer</a>
    <a href="app.html" class="btn-secondary">Tableau de bord</a>
  `;
}

function spawnConfetti() {
  var colors = ['#3B1772','#10B981','#F59E0B','#EF4444','#8B5CF6','#06B6D4'];
  var wrap = document.getElementById('confetti');
  for (var i = 0; i < 60; i++) {
    (function(i) {
      setTimeout(function() {
        var p = document.createElement('div');
        p.className = 'confetti-piece';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
        p.style.width = (Math.random() * 8 + 5) + 'px';
        p.style.height = (Math.random() * 8 + 5) + 'px';
        p.style.animation = 'fall ' + (Math.random() * 2 + 1.5) + 's linear forwards';
        wrap.appendChild(p);
        setTimeout(function() { p.remove(); }, 3500);
      }, i * 40);
    })(i);
  }
}

(async function() {
  var s = await _supa.auth.getSession();
  if (!s.data.session) {
    window.location.href = 'login.html';
    return;
  }

  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';

  if (status === 'success') {
    renderSuccess();
  } else if (status === 'pending') {
    renderPending();
  } else {
    renderError();
  }
})();
</script>
</body>
</html>
