<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Invoice — Prospeo</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#003399;--text:#0D1117;--text2:#6B7280;--border:#E5E7EB;--bg:#F8FAFF;--white:#fff;--success:#059669;--warning:#D97706;--r:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
header{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.header-logo img{height:22px;width:auto}
.header-badge{font-size:11px;padding:3px 10px;background:#EEF2FF;color:var(--brand);border-radius:20px;font-weight:600}
.container{max-width:700px;margin:40px auto;padding:0 20px}
.invoice-card{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.inv-head{padding:32px 36px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px}
.inv-brand img{height:28px;width:auto;margin-bottom:12px}
.inv-title{font-size:28px;font-weight:700;color:var(--text);letter-spacing:-1px}
.inv-number{font-size:13px;color:var(--text2);margin-top:4px}
.inv-status{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;margin-top:12px}
.status-paid{background:#ECFDF5;color:var(--success)}
.status-sent{background:#FEF3C7;color:var(--warning)}
.status-draft{background:#F3F4F6;color:var(--text2)}
.status-overdue{background:#FEF2F2;color:#DC2626}
.inv-parties{padding:28px 36px;display:grid;grid-template-columns:1fr 1fr;gap:24px;border-bottom:1px solid var(--border)}
.party-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.party-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.party-detail{font-size:13px;color:var(--text2);line-height:1.6}
.inv-dates{padding:16px 36px;display:flex;gap:32px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.date-item{font-size:13px;color:var(--text2)}
.date-item strong{color:var(--text);font-weight:600}
.inv-lines{padding:28px 36px}
.lines-head{display:grid;grid-template-columns:1fr 80px 90px 100px;gap:8px;padding-bottom:10px;border-bottom:2px solid var(--text);margin-bottom:8px}
.lines-head span{font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.04em}
.line-row{display:grid;grid-template-columns:1fr 80px 90px 100px;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.line-row:last-child{border-bottom:none}
.line-desc{font-size:14px;color:var(--text)}
.line-num{font-size:14px;color:var(--text2);text-align:right}
.inv-totals{padding:20px 36px;border-top:2px solid var(--text)}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:14px;color:var(--text2)}
.total-row.total{font-size:18px;font-weight:700;color:var(--text);padding-top:12px;border-top:1px solid var(--border);margin-top:8px}
.inv-footer{padding:24px 36px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.download-btn{display:inline-flex;align-items:center;gap:8px;background:var(--brand);color:#fff;padding:10px 20px;border-radius:var(--r);font-size:14px;font-weight:600;border:none;cursor:pointer;text-decoration:none;transition:opacity .2s}
.download-btn:hover{opacity:.88}
.powered-by{font-size:11px;color:var(--text2)}
.powered-by a{color:var(--brand);text-decoration:none;font-weight:500}
.loading{text-align:center;padding:80px;color:var(--text2)}
.error-state{text-align:center;padding:80px}
.error-icon{font-size:48px;margin-bottom:16px}
.error-title{font-size:20px;font-weight:600;color:var(--text);margin-bottom:8px}
.error-desc{font-size:14px;color:var(--text2)}
@media(max-width:600px){.inv-parties{grid-template-columns:1fr}.inv-head{padding:20px}.inv-parties,.inv-dates,.inv-lines,.inv-totals,.inv-footer{padding-left:20px;padding-right:20px}.lines-head,.line-row{grid-template-columns:1fr 70px 80px 90px;font-size:12px}}
</style>
</head>
<body>
<header>
  <div class="header-logo"><img src="prospeo-logo.svg" alt="Prospeo"></div>
  <span class="header-badge">Client Invoice Portal</span>
</header>
<div class="container">
  <div class="invoice-card" id="invoice-card">
    <div class="loading">Loading your invoice...</div>
  </div>
</div>
<script>
var SUPA_URL='https://ferkzwzypmdtuypxribz.supabase.co';
var ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlcmt6d3p5cG1kdHV5cHhyaWJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjY4MjksImV4cCI6MjA4OTI0MjgyOX0.KbRa1t0VqrdURT0xbWLUXOZrf462wLNZaUgljk7h6eg';
var _supa=supabase.createClient(SUPA_URL,ANON_KEY);

function sanitize(s){var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}
function formatEUR(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0);}
function formatDate(s){if(!s)return '—';return new Date(s).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});}

(async function(){
  var params = new URLSearchParams(window.location.search);
  var token = params.get('t');
  var card = document.getElementById('invoice-card');

  if (!token) {
    card.innerHTML = '<div class="error-state"><div class="error-icon">&#128274;</div><div class="error-title">Invalid link</div><div class="error-desc">This invoice link is invalid or has expired.</div></div>';
    return;
  }

  try {
    // Get token + invoice data
    var {data:tok, error:tokErr} = await _supa.from('client_portal_tokens')
      .select('invoice_id, views, expires_at').eq('token', token).single();

    if (tokErr || !tok) throw new Error('Token not found');
    if (new Date(tok.expires_at) < new Date()) throw new Error('Link expired');

    // Increment view count
    await _supa.from('client_portal_tokens').update({views:(tok.views||0)+1}).eq('token', token);

    // Get invoice + line items
    var {data:inv, error:invErr} = await _supa.from('invoices')
      .select('*').eq('id', tok.invoice_id).single();
    if (invErr || !inv) throw new Error('Invoice not found');

    var {data:items} = await _supa.from('invoice_items')
      .select('*').eq('invoice_id', tok.invoice_id).order('position');

    var statusLabel = {draft:'Draft',sent:'Awaiting payment',paid:'Paid',overdue:'Overdue'};
    var statusClass = {draft:'status-draft',sent:'status-sent',paid:'status-paid',overdue:'status-overdue'};
    var statusIcon  = {draft:'&#9998;',sent:'&#9200;',paid:'&#10003;',overdue:'&#9888;'};
    var st = inv.status||'draft';

    var linesHTML = (items||[]).map(function(item){
      return '<div class="line-row">' +
        '<div class="line-desc">' + sanitize(item.description||item.title||'') + '</div>' +
        '<div class="line-num">' + (item.quantity||1) + '</div>' +
        '<div class="line-num">' + formatEUR(item.unit_price||item.amount_ht||0) + '</div>' +
        '<div class="line-num">' + formatEUR((item.quantity||1)*(item.unit_price||item.amount_ht||0)) + '</div>' +
      '</div>';
    }).join('');

    card.innerHTML =
      '<div class="inv-head">' +
        '<div><div class="inv-brand"><img src="prospeo-logo.svg" alt="Prospeo" style="height:20px"></div>' +
        '<div class="inv-title">Invoice</div>' +
        '<div class="inv-number">#' + sanitize(inv.number||inv.id.slice(0,8).toUpperCase()) + '</div>' +
        '<div class="inv-status ' + (statusClass[st]||'status-draft') + '">' +
          (statusIcon[st]||'') + ' ' + (statusLabel[st]||st) +
        '</div></div>' +
        '<div style="text-align:right">' +
          '<div style="font-size:32px;font-weight:700;color:var(--text);letter-spacing:-1px">' + formatEUR(inv.amount_ttc||0) + '</div>' +
          '<div style="font-size:12px;color:var(--text2);margin-top:4px">TTC (incl. ' + (inv.tva_rate||20) + '% TVA)</div>' +
        '</div>' +
      '</div>' +
      '<div class="inv-parties">' +
        '<div><div class="party-label">From</div>' +
          '<div class="party-name">' + sanitize(inv.sender_name||'Prospeo User') + '</div>' +
          '<div class="party-detail">' + sanitize(inv.sender_email||'') + '</div>' +
        '</div>' +
        '<div><div class="party-label">To</div>' +
          '<div class="party-name">' + sanitize(inv.client_name||'—') + '</div>' +
          '<div class="party-detail">' + sanitize(inv.client_email||'') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="inv-dates">' +
        '<div class="date-item">Invoice date: <strong>' + formatDate(inv.issue_date||inv.created_at) + '</strong></div>' +
        (inv.due_date?'<div class="date-item">Due date: <strong>' + formatDate(inv.due_date) + '</strong></div>':'') +
      '</div>' +
      '<div class="inv-lines">' +
        '<div class="lines-head"><span>Description</span><span style="text-align:right">Qty</span><span style="text-align:right">Unit price</span><span style="text-align:right">Total</span></div>' +
        (linesHTML || '<div class="line-row"><div class="line-desc">' + sanitize(inv.title||'Services') + '</div><div class="line-num">1</div><div class="line-num">' + formatEUR(inv.amount_ht||0) + '</div><div class="line-num">' + formatEUR(inv.amount_ht||0) + '</div></div>') +
      '</div>' +
      '<div class="inv-totals">' +
        '<div class="total-row"><span>Subtotal HT</span><span>' + formatEUR(inv.amount_ht||0) + '</span></div>' +
        '<div class="total-row"><span>TVA ' + (inv.tva_rate||20) + '%</span><span>' + formatEUR((inv.amount_ttc||0)-(inv.amount_ht||0)) + '</span></div>' +
        '<div class="total-row total"><span>Total TTC</span><span>' + formatEUR(inv.amount_ttc||0) + '</span></div>' +
      '</div>' +
      '<div class="inv-footer">' +
        '<button class="download-btn" onclick="window.print()">&#8681; Download PDF</button>' +
        '<div class="powered-by">Invoice managed with <a href="index.html" target="_blank">Prospeo</a></div>' +
      '</div>';

  } catch(e) {
    card.innerHTML = '<div class="error-state"><div class="error-icon">&#128683;</div><div class="error-title">Invoice not found</div><div class="error-desc">' + sanitize(e.message||'This link may have expired or been revoked.') + '</div></div>';
  }
})();
</script>
</body>
</html>
